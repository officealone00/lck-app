name: Scrape LCK Data

on:
  schedule:
    # KST 01:00 = UTC 16:00 (전날)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper/scrape.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 LCK 데이터 자동 갱신 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          fi
