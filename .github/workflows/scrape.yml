name: Scrape LCK Data

# Riot 공식 lolesports API 사용
# 매일 KST 02:00 (UTC 17:00) 자동 갱신
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper/scrape.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 LCK 데이터 자동 갱신 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          fi

      - name: Purge jsdelivr cache
        if: success()
        run: |
          curl -s "https://purge.jsdelivr.net/gh/officealone00/lck-app@main/public/data/standings.json"
          curl -s "https://purge.jsdelivr.net/gh/officealone00/lck-app@main/public/data/matches.json"
          curl -s "https://purge.jsdelivr.net/gh/officealone00/lck-app@main/public/data/updated.json"
          echo "✓ jsdelivr cache purged"
